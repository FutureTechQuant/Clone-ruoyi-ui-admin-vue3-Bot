name: Create and init Vue3 UI repo (org, Pages via Actions)

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "要创建的新 GitHub 仓库名（例如: future-ui-admin-vue3）"
        required: true
        default: "future-ui-admin-vue3"
      repo_description:
        description: "仓库描述"
        required: false
        default: "Init from Gitee yudao-ui-admin-vue3"
      private:
        description: "是否创建为私有仓库 (true/false)"
        required: false
        default: "false"
      default_branch:
        description: "新仓库默认分支名（main 或 master）"
        required: false
        default: "master"

jobs:
  create-and-init:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ORG: FutureTechQuant
      NEW_REPO: ${{ github.event.inputs.repo_name }}
      REPO_DESC: ${{ github.event.inputs.repo_description }}
      PRIVATE: ${{ github.event.inputs.private }}
      DEFAULT_BRANCH: ${{ github.event.inputs.default_branch }}

    steps:
      - name: Checkout Clone-Bot
        uses: actions/checkout@v4

      - name: Generate GitHub App installation token (org)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}

      - name: Export APP_TOKEN
        shell: bash
        run: |
          set -euo pipefail
          echo "APP_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: pip install -q -r tools/requirements.txt

      - name: Delete existing repo if exists
        shell: bash
        run: |
          set -euo pipefail

          CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}")"

          if [ "${CODE}" = "200" ]; then
            echo "Repo exists, deleting: ${ORG}/${NEW_REPO}"
            curl -sS -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${ORG}/${NEW_REPO}"
            sleep 3
          else
            echo "Repo not found (HTTP ${CODE}), skip delete"
          fi

      - name: Clone from Gitee
        shell: bash
        run: |
          set -euo pipefail
          git clone -q --depth=1 --single-branch \
            https://gitee.com/yudaocode/yudao-ui-admin-vue3.git source

          rm -rf source/.git source/.gitee source/.github \
                 source/README.md source/README-zh_CN.md

      - name: Replace text content
        shell: bash
        run: |
          set -euo pipefail
          (cd source && python3 ../tools/replace_all.py)

      - name: Copy workflow templates into new repo
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source/.github/workflows

          if [ ! -f "templates/workflows/pages.yml" ]; then
            echo "ERROR: templates/workflows/pages.yml not found"
            exit 1
          fi

          cp -f templates/workflows/pages.yml source/.github/workflows/pages.yml

          # 把 pages.yml 里触发分支改成你输入的默认分支（main/master）
          # 这里假设模板里是：branches: [ master ]
          sed -i "s/branches: \\[ master \\]/branches: [ ${DEFAULT_BRANCH} ]/g" source/.github/workflows/pages.yml || true

      - name: Prepare repo content
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repo_content
          cp -a source/. repo_content/
          rm -rf source

      - name: Create new GitHub repo (org)
        shell: bash
        run: |
          set -euo pipefail

          PRIVATE_BOOL=$( [ "${PRIVATE}" = "true" ] && echo true || echo false )

          RESP_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS -o "${RESP_FILE}" -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${ORG}/repos" \
            -d "{
              \"name\": \"${NEW_REPO}\",
              \"description\": \"${REPO_DESC}\",
              \"private\": ${PRIVATE_BOOL}
            }")"

          if [ "${HTTP_CODE}" != "201" ]; then
            echo "ERROR: Failed to create repo (HTTP ${HTTP_CODE}). Response:"
            cat "${RESP_FILE}"
            exit 1
          fi

          sleep 3

      - name: Push to new repo (DEFAULT_BRANCH)
        shell: bash
        run: |
          set -euo pipefail

          git config --global credential.helper store
          echo "https://x-access-token:${APP_TOKEN}@github.com" > ~/.git-credentials

          cd repo_content
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "Initial commit: 梦开始的地方"

          git branch -M "${DEFAULT_BRANCH}"
          git remote add origin "https://github.com/${ORG}/${NEW_REPO}.git"
          git push -q -u origin "${DEFAULT_BRANCH}"

          rm -f ~/.git-credentials

      - name: Set repository default branch (optional but recommended)
        shell: bash
        run: |
          set -euo pipefail

          RESP_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS -o "${RESP_FILE}" -w "%{http_code}" \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}" \
            -d "{\"default_branch\":\"${DEFAULT_BRANCH}\"}")"

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "WARN: Set default_branch failed (HTTP ${HTTP_CODE}). Response:"
            cat "${RESP_FILE}"
            # 不强制失败，继续后续 Pages
          fi

      - name: Enable Pages (build_type=workflow) - scheme B
        shell: bash
        run: |
          set -euo pipefail

          echo "Enable Pages for ${ORG}/${NEW_REPO} with build_type=workflow"

          # 1) Create Pages site if needed
          RESP_FILE1="$(mktemp)"
          CODE1="$(curl -sS -o "${RESP_FILE1}" -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}/pages" \
            -d "{
              \"build_type\": \"workflow\",
              \"source\": {\"branch\": \"${DEFAULT_BRANCH}\", \"path\": \"/\"}
            }")"

          if [ "${CODE1}" = "201" ]; then
            echo "Pages created"
          elif [ "${CODE1}" = "409" ]; then
            echo "Pages already exists (409), continue"
          else
            echo "WARN: Create Pages returned HTTP ${CODE1}. Response:"
            cat "${RESP_FILE1}"
            # 不立刻退出，继续 PUT（很多情况下站点已存在或需要 PUT 修正）
          fi

          # 2) Force set build_type=workflow
          RESP_FILE2="$(mktemp)"
          CODE2="$(curl -sS -o "${RESP_FILE2}" -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}/pages" \
            -d "{\"build_type\":\"workflow\"}")"

          if [ "${CODE2}" != "204" ] && [ "${CODE2}" != "200" ]; then
            echo "ERROR: Update Pages build_type failed (HTTP ${CODE2}). Response:"
            cat "${RESP_FILE2}"
            exit 1
          fi

      - name: Print expected Pages URL
        shell: bash
        run: |
          set -euo pipefail
          echo "Expected Pages URL:"
          echo "https://${ORG,,}.github.io/${NEW_REPO}/"
