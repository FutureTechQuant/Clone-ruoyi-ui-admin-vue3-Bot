name: Enable GitHub Pages (once)

on:
  workflow_run:
    workflows: ["Build and Deploy to GitHub Pages"]
    types: [completed]

jobs:
  enable-pages:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Enable Pages (idempotent)
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          echo "⏳ Wait for gh-pages branch..."
          for i in $(seq 1 30); do
            CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${OWNER}/${REPO}/branches/gh-pages")"
            if [ "${CODE}" = "200" ]; then
              echo "✅ gh-pages branch exists"
              break
            fi
            sleep 10
          done

          # Check if Pages is already enabled
          CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pages")"

          if [ "${CODE}" = "200" ]; then
            echo "ℹ️ Pages already enabled, skip"
            exit 0
          fi

          echo "🚀 Enabling Pages..."
          curl -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pages" \
            -d '{"source": {"branch": "gh-pages", "path": "/"}}' \
            || echo "⚠️ Enable Pages failed (maybe already enabled)"
